name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.2"
  # `OS=latest` alone doesn't pick a device — xcodebuild needs a name to
  # disambiguate. iPhone 16 Pro is the current flagship in GitHub's
  # macos-latest image (Xcode 16.2 / macOS 15) and resolves to iOS 18.6
  # under `OS=latest`. iPhone 15 (the previous pin) is no longer shipped.
  SIMULATOR: "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
  SCHEME: Regards

jobs:
  xcodegen-determinism:
    name: xcodegen determinism
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Regenerate project
        working-directory: ios
        run: xcodegen generate
      - name: Assert committed xcodeproj matches project.yml
        run: |
          if ! git diff --exit-code ios/Regards.xcodeproj; then
            echo "::error::Regards.xcodeproj is out of date. Run 'cd ios && xcodegen generate' and commit the result."
            exit 1
          fi

  build:
    name: Build
    runs-on: macos-latest
    needs: xcodegen-determinism
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      # GitHub's macos-latest image (Xcode 16.2 / macOS 15) installs Xcode
      # without the iOS platform — `xcodebuild -showdestinations` reports
      # "iOS 18.2 is not installed". Even building against the iOS
      # Simulator SDK requires the platform; install before any xcodebuild
      # step that targets iOS.
      - name: Install iOS platform
        # Wrap in a retry loop — `xcodebuild -downloadPlatform iOS`
        # intermittently fails with "Unable to connect to simulator"
        # against Apple's CDN (observed twice in 24h on the macos-latest
        # image). Three attempts with 15s backoff has been enough each
        # time. No-op cost when healthy.
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              [ "$attempt" -gt 1 ] && echo "downloadPlatform succeeded on attempt $attempt (after retries)"
              exit 0
            fi
            echo "::warning::downloadPlatform failed on attempt $attempt; sleeping 15s before retry"
            sleep 15
          done
          echo "::error::xcodebuild -downloadPlatform iOS failed after 3 attempts"
          exit 1
      - name: Build
        working-directory: ios
        # `generic/platform=iOS Simulator` resolves against the SDK
        # without booting a device — fine for `build`, since we only need
        # the artifacts. Test jobs use the bootable destination instead.
        run: |
          set -o pipefail
          xcodebuild \
            -project Regards.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build \
            | xcbeautify --renderer github-actions

  unit-tests:
    name: Unit tests + coverage
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Install iOS platform
        # Wrap in a retry loop — `xcodebuild -downloadPlatform iOS`
        # intermittently fails with "Unable to connect to simulator"
        # against Apple's CDN (observed twice in 24h on the macos-latest
        # image). Three attempts with 15s backoff has been enough each
        # time. No-op cost when healthy.
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              [ "$attempt" -gt 1 ] && echo "downloadPlatform succeeded on attempt $attempt (after retries)"
              exit 0
            fi
            echo "::warning::downloadPlatform failed on attempt $attempt; sleeping 15s before retry"
            sleep 15
          done
          echo "::error::xcodebuild -downloadPlatform iOS failed after 3 attempts"
          exit 1
      - name: Run RegardsTests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Regards.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR" \
            -configuration Debug \
            -only-testing:RegardsTests \
            -resultBundlePath build/RegardsTests.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            | xcbeautify --renderer github-actions
      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RegardsTests.xcresult
          path: ios/build/RegardsTests.xcresult

  accessibility-audit:
    name: Accessibility audit
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - name: Install iOS platform
        # Wrap in a retry loop — `xcodebuild -downloadPlatform iOS`
        # intermittently fails with "Unable to connect to simulator"
        # against Apple's CDN (observed twice in 24h on the macos-latest
        # image). Three attempts with 15s backoff has been enough each
        # time. No-op cost when healthy.
        run: |
          set -o pipefail
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              [ "$attempt" -gt 1 ] && echo "downloadPlatform succeeded on attempt $attempt (after retries)"
              exit 0
            fi
            echo "::warning::downloadPlatform failed on attempt $attempt; sleeping 15s before retry"
            sleep 15
          done
          echo "::error::xcodebuild -downloadPlatform iOS failed after 3 attempts"
          exit 1
      - name: Run RegardsAccessibilityTests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project Regards.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR" \
            -configuration Debug \
            -only-testing:RegardsAccessibilityTests \
            -resultBundlePath build/RegardsAccessibilityTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test \
            | xcbeautify --renderer github-actions
      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RegardsAccessibilityTests.xcresult
          path: ios/build/RegardsAccessibilityTests.xcresult

  # PR3 wires in snapshot tests once swift-snapshot-testing lands. Placeholder
  # job kept here so branch protection can reference it by name from day 1.
  snapshot-tests:
    name: Snapshot tests (PR3+)
    runs-on: macos-latest
    needs: build
    if: false
    steps:
      - run: echo "Populated in PR3"
