name: Lint

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/lint.yml"
      - ".swiftlint.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/lint.yml"
      - ".swiftlint.yml"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict
