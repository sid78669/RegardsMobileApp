name: Lint

on:
  push:
    branches: [main]
  pull_request:

# Path filters were intentionally removed: branch protection requires
# this check to pass, and a path-filtered workflow doesn't run on
# unrelated-paths PRs (gitignore tweaks, root README edits, etc.). The
# resulting "required check missing" status blocks merge. We pay ~30s
# of trivial CI on every PR in exchange for the gate always being
# answerable.

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict
